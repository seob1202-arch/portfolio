<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>VIBE LAB 🧪</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
  <style>
    /* --- 1. 글로벌 & 코어 테마 (Dark/Neon Futurism) --- */
    :root {
      --bg-base: #050505;
      --bg-surface: rgba(20, 20, 22, 0.4);
      --bg-glass: rgba(10, 10, 12, 0.6);
      --text-main: #ffffff;
      --text-muted: #888890;
      --border-color: rgba(255, 255, 255, 0.08);
      --border-hover: rgba(255, 255, 255, 0.2);
      --accent: #00e5ff;
      --accent-glow: rgba(0, 229, 255, 0.4);
      --vibe-gradient: linear-gradient(135deg, #00e5ff, #bd00ff);
      --radius-xl: 32px;
      --radius-lg: 24px;
      --radius-md: 16px;
      --spring: cubic-bezier(0.175, 0.885, 0.32, 1.1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
    
    body {
      font-family: "Pretendard Variable", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background-color: var(--bg-base); 
      color: var(--text-main); 
      line-height: 1.6;
      -webkit-font-smoothing: antialiased; 
      overflow-x: hidden;
    }

    /* 필름 노이즈 & 배경 오로라 */
    .bg-noise {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      opacity: 0.04; z-index: -1; pointer-events: none;
    }
    
    #cursor-glow {
      position: fixed; width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(189, 0, 255, 0.15) 0%, transparent 60%);
      border-radius: 50%; transform: translate(-50%, -50%);
      pointer-events: none; z-index: -2; transition: width 0.3s, height 0.3s;
    }
    
    .custom-cursor {
      position: fixed; top: 0; left: 0; width: 12px; height: 12px;
      background: var(--text-main); border-radius: 50%;
      transform: translate(-50%, -50%); pointer-events: none; z-index: 9999;
      mix-blend-mode: difference; transition: width 0.2s, height 0.2s;
    }
    body:hover .custom-cursor { width: 12px; height: 12px; }

    /* --- 2. 네비게이션 --- */
    nav {
      position: fixed; top: 32px; left: 50%; transform: translateX(-50%); z-index: 100;
      background: var(--bg-glass); backdrop-filter: blur(24px); border: 1px solid var(--border-color);
      border-radius: 999px; padding: 0.8rem 2.5rem; display: flex; gap: 4rem; align-items: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .nav-logo { font-size: 1.2rem; font-weight: 900; color: var(--text-main); text-decoration: none; letter-spacing: 0.05em; text-transform: uppercase; }
    .nav-links { display: flex; gap: 2.5rem; align-items: center; }
    .nav-links a { text-decoration: none; color: var(--text-muted); font-size: 0.95rem; font-weight: 600; letter-spacing: 0.05em; transition: 0.3s; }
    .nav-links a:hover { color: var(--text-main); text-shadow: 0 0 10px rgba(255,255,255,0.5); }

    main { max-width: 1200px; margin: 0 auto; padding: 12rem 1.5rem 6rem; position: relative; }
    section { margin-bottom: 12rem; }
    h2 { font-size: 3.5rem; font-weight: 900; margin-bottom: 4rem; letter-spacing: -0.04em; color: var(--text-main); text-transform: uppercase; }

    /* --- 3. 헤더 --- */
    .hero { min-height: 60vh; display: flex; flex-direction: column; justify-content: center; align-items: flex-start; position: relative; }
    .hero-badge { display: inline-block; padding: 0.5rem 1rem; background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); border-radius: 999px; font-size: 0.9rem; font-weight: 700; letter-spacing: 0.05em; margin-bottom: 2rem; color: var(--accent); }
    .hero h1 { font-size: clamp(3rem, 8vw, 6.5rem); font-weight: 900; letter-spacing: -0.04em; line-height: 1; margin-bottom: 2rem; position: relative; }
    .hero h1 .vibe-mask {
      background: url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=2070&auto=format&fit=crop') center/cover;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
      filter: drop-shadow(0 0 20px rgba(0,229,255,0.3));
    }
    .hero p { color: var(--text-muted); font-size: 1.4rem; font-weight: 500; max-width: 600px; line-height: 1.6; margin-bottom: 4rem; word-break: keep-all; }
    .btn-glow {
      position: relative; padding: 1.2rem 3rem; background: transparent; color: var(--text-main);
      font-size: 1.1rem; font-weight: 800; letter-spacing: 0.05em;
      border: 1px solid var(--border-color); border-radius: 999px; text-decoration: none;
      overflow: hidden; transition: 0.4s ease; display: inline-flex;
    }
    .btn-glow::before {
      content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
      background: var(--vibe-gradient); transition: 0.4s ease; z-index: -1;
    }
    .btn-glow:hover::before { left: 0; }
    .btn-glow:hover { border-color: transparent; box-shadow: 0 0 30px var(--accent-glow); transform: scale(1.05); }

    /* --- 4. 카드 그리드 & 스켈레톤 로딩 --- */
    .project-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 2rem; }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .skeleton-box { background: rgba(255,255,255,0.05); border-radius: var(--radius-lg); height: 400px; animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    .skeleton-social { background: rgba(255,255,255,0.05); border-radius: 0; height: 180px; animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite; }

    .card-wrapper {
      position: relative; border-radius: var(--radius-lg); background: rgba(255,255,255,0.02);
      padding: 1px; overflow: hidden; cursor: pointer;
    }
    .card-wrapper::before {
      content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(800px circle at var(--mouse-x, 0) var(--mouse-y, 0), rgba(255,255,255,0.3), transparent 40%);
      z-index: 0; opacity: 0; transition: opacity 0.3s;
    }
    .card-wrapper:hover::before { opacity: 1; }
    
    .project-card {
      position: relative; background: var(--bg-surface); border-radius: calc(var(--radius-lg) - 1px);
      height: 100%; z-index: 1; display: flex; flex-direction: column; overflow: hidden;
      backdrop-filter: blur(10px); transition: transform 0.4s var(--spring);
    }
    .card-wrapper:hover .project-card { transform: scale(0.98); }
    .project-card::after {
      content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(600px circle at var(--mouse-x, 0) var(--mouse-y, 0), rgba(255,255,255,0.06), transparent 40%);
      z-index: 2; opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    .card-wrapper:hover .project-card::after { opacity: 1; }

    .project-img-wrapper { height: 260px; overflow: hidden; background: #111; position: relative; }
    .project-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; transition: 0.5s; filter: grayscale(50%); }
    .card-wrapper:hover .project-img { opacity: 1; filter: grayscale(0%); transform: scale(1.05); }
    .project-content { padding: 2.5rem; display: flex; flex-direction: column; flex: 1; position: relative; z-index: 3; }
    .project-title { font-size: 1.6rem; font-weight: 800; margin-bottom: 0.5rem; letter-spacing: -0.02em; }
    .status-badge { display: inline-block; font-size: 0.8rem; font-weight: 800; padding: 0.3rem 0.8rem; border-radius: 4px; background: rgba(255,255,255,0.1); color: var(--text-main); margin-bottom: 1.5rem; }
    .project-desc-short { color: var(--text-muted); font-size: 1.05rem; line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 2.5rem; word-break: keep-all; }
    .project-meta { margin-top: auto; display: flex; gap: 1.5rem; font-size: 0.95rem; font-weight: 700; }

    /* --- 5. 에코시스템 --- */
    .bento-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1px; background: var(--border-color); border: 1px solid var(--border-color); border-radius: var(--radius-xl); overflow: hidden; }
    .social-card {
      background: var(--bg-surface); padding: 4rem 3rem; display: flex; flex-direction: column; gap: 1.5rem;
      text-decoration: none; color: var(--text-main); position: relative; overflow: hidden;
      transition: background 0.3s;
    }
    .social-card:hover { background: rgba(255,255,255,0.05); }
    .social-platform { font-size: 0.9rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.2em; color: var(--text-muted); }
    .social-handle { font-size: 2.2rem; font-weight: 900; letter-spacing: -0.03em; }
    .social-desc { font-size: 1.1rem; color: var(--text-muted); word-break: keep-all; }

    /* --- 6. 연락처 --- */
    .contact-container {
      background: #000; border: 1px solid var(--border-color); border-radius: var(--radius-xl);
      padding: 5rem; display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; position: relative;
    }
    .contact-info-text { font-size: 4rem; font-weight: 900; line-height: 1.1; margin-bottom: 2rem; text-transform: uppercase; }
    .contact-info-text span { color: var(--accent); }
    .form-input { 
      width: 100%; padding: 1.5rem 0; border: none; border-bottom: 1px solid var(--border-color); 
      background: transparent; color: var(--text-main); font-size: 1.1rem; 
      outline: none; transition: 0.3s; 
    }
    .form-input:focus { border-color: var(--accent); box-shadow: 0 10px 20px -10px var(--accent-glow); }
    .form-input::placeholder { color: #666; font-weight: 500; }
    .btn-submit { 
      background: var(--text-main); color: #000; border: none; padding: 1.5rem; width: 100%;
      border-radius: 8px; font-size: 1.2rem; font-weight: 900;
      cursor: none; margin-top: 2rem; transition: 0.3s;
    }
    .btn-submit:hover { background: var(--accent); transform: translateY(-4px); box-shadow: 0 10px 20px var(--accent-glow); }

    /* --- 7. 모달 & 입력창 대응 --- */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      z-index: 1000; display: flex; justify-content: flex-end; 
      opacity: 0; pointer-events: none; transition: opacity 0.4s ease;
    }
    .modal-overlay.active { opacity: 1; pointer-events: auto; }
    
    .modal-content {
      background: var(--bg-base); width: 100%; max-width: 600px; height: 100vh;
      overflow-y: auto; position: relative; border-left: 1px solid var(--border-color);
      transform: translateX(100%); transition: transform 0.6s var(--spring), padding-bottom 0.3s ease;
      display: flex; flex-direction: column;
    }
    .modal-content.keyboard-active { padding-bottom: 50vh !important; }
    .modal-overlay.active .modal-content { transform: translateX(0); }
    
    .modal-close-area { position: absolute; top: 0; left: 0; width: calc(100% - 600px); height: 100%; cursor: none; }
    
    .modal-header { position: sticky; top: 0; display: flex; justify-content: space-between; align-items: center; padding: 2rem; background: rgba(5,5,5,0.8); backdrop-filter: blur(10px); z-index: 10; border-bottom: 1px solid var(--border-color); }
    .modal-title-sm { font-size: 1.1rem; font-weight: 800; letter-spacing: 0.05em; color: var(--text-muted); }
    .modal-close { background: transparent; border: 1px solid var(--border-color); width: 44px; height: 44px; border-radius: 50%; color: var(--text-main); display: flex; justify-content: center; align-items: center; cursor: none; transition: 0.3s; }
    .modal-close:hover { background: var(--text-main); color: #000; transform: rotate(90deg); }
    
    .modal-img { width: 100%; height: 400px; object-fit: cover; }
    .modal-body { padding: 3rem; }
    .modal-title { font-size: 2.5rem; font-weight: 900; line-height: 1.2; margin-bottom: 1.5rem; word-break: keep-all; }
    .modal-desc { font-size: 1.1rem; color: var(--text-muted); margin-bottom: 3rem; line-height: 1.8; word-break: keep-all; }
    
    .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 3rem; }
    .btn-action, .btn-visit { background: transparent; color: var(--text-main); border: 1px solid var(--border-color); padding: 1.2rem; border-radius: 8px; font-weight: 800; font-size: 1.05rem; text-align: center; text-decoration: none; cursor: none; transition: 0.3s; }
    .btn-action:hover { border-color: var(--accent); color: var(--accent); }
    .btn-visit { background: var(--text-main); color: #000; }
    .btn-visit:hover { background: var(--accent); color: #000; border-color: var(--accent); box-shadow: 0 0 20px var(--accent-glow); }

    .comment-section-title { font-size: 1.3rem; font-weight: 800; margin-bottom: 1.5rem; border-top: 1px solid var(--border-color); padding-top: 3rem; }
    .comment-list { display: flex; flex-direction: column; gap: 1.5rem; margin-bottom: 2rem; }
    .comment-item { padding: 1.5rem; background: rgba(255,255,255,0.03); border-radius: 12px; border: 1px solid var(--border-color); }
    .comment-user { font-weight: 800; color: var(--accent); font-size: 1.05rem; margin-bottom: 0.5rem; display: block; }
    .comment-text { color: var(--text-main); font-size: 1.05rem; line-height: 1.6; }
    
    .comment-form { display: flex; flex-direction: column; gap: 1rem; }
    .comment-input { padding: 1.2rem; border: 1px solid var(--border-color); background: rgba(0,0,0,0.5); color: #fff; border-radius: 8px; font-family: inherit; font-size: 1rem; outline: none; }
    .comment-input:focus { border-color: var(--accent); }
    .btn-submit-comment { background: var(--text-main); color: #000; border: none; padding: 1.2rem; border-radius: 8px; font-weight: 900; font-size: 1.05rem; cursor: none; transition: 0.3s; }
    .btn-submit-comment:hover { background: var(--accent); }

    /* 모달 하단 닫기 버튼 스타일 추가 */
    .btn-close-bottom {
      background: transparent; color: var(--text-muted); border: 1px solid var(--border-color);
      padding: 1.2rem; border-radius: 8px; font-weight: 800; font-size: 1.05rem;
      width: 100%; cursor: none; transition: 0.3s; margin-top: 1rem; text-align: center;
    }
    .btn-close-bottom:hover { background: rgba(255,255,255,0.05); color: var(--text-main); border-color: var(--text-muted); }

    .toast { position: fixed; bottom: 40px; right: 40px; background: var(--vibe-gradient); color: #fff; padding: 1.2rem 2.5rem; border-radius: 8px; font-weight: 800; font-size: 1.05rem; box-shadow: 0 10px 30px rgba(0,229,255,0.3); transform: translateY(100px); opacity: 0; transition: 0.5s var(--spring); z-index: 9999; }
    .toast.show { transform: translateY(0); opacity: 1; }

    /* ★ 모바일 최적화 ★ */
    @media (max-width: 768px) {
      * { cursor: auto; } .custom-cursor, #cursor-glow, .modal-close-area { display: none; }
      nav { width: calc(100% - 2rem); padding: 0.8rem 1.5rem; gap: 1rem; justify-content: space-between; }
      .nav-links a { display: none; }
      
      main { padding: 8rem 1rem 4rem; }
      h2 { font-size: 2.2rem; margin-bottom: 2rem; }
      .hero h1 { font-size: 3rem; line-height: 1.1; }
      .hero p { font-size: 1.1rem; }
      
      .contact-container { grid-template-columns: 1fr; padding: 3rem 1.5rem; }
      .contact-info-text { font-size: 2.2rem; }
      
      .modal-overlay { justify-content: flex-end; align-items: flex-end; }
      .modal-content { max-width: 100%; height: 90dvh; border-radius: var(--radius-xl) var(--radius-xl) 0 0; transform: translateY(100%); border-left: none; border-top: 1px solid var(--border-color); }
      .modal-overlay.active .modal-content { transform: translateY(0); }
      .modal-header { padding: 1.5rem; }
      .modal-img { height: 250px; }
      .modal-body { padding: 1.5rem; }
      .modal-title { font-size: 1.8rem; }
      .action-row { grid-template-columns: 1fr; }
      
      .btn-close-bottom { cursor: auto; margin-bottom: 2rem; }
    }
  </style>
</head>
<body>

  <div class="bg-noise"></div>
  <div id="cursor-glow"></div>
  <div class="custom-cursor"></div>

  <nav>
    <a href="#" class="nav-logo">Vibe Lab 🧪</a>
    <div class="nav-links">
      <a href="#projects-section">프로젝트</a>
      <a href="#socials-section">생태계</a>
      <a href="#contact-section">커피챗</a>
    </div>
  </nav>

  <main>
    <section class="hero">
      <div class="hero-badge">✨ 언제나 환영해요</div>
      <h1>
        <span class="vibe-mask">LIMITLESS</span><br>
        CREATION.
      </h1>
      <p>코드 한 줄 몰라도 괜찮습니다. AI와 당신의 감각(Vibe)만 있다면 무엇이든 만들어내는 1인 개발 생태계에 놀러오세요!</p>
      <a href="#projects-section" class="btn-glow">프로젝트 구경하기 👀</a>
    </section>

    <section id="projects-section">
      <h2>Projects</h2>
      <div id="project-container" class="project-grid">
        <div class="skeleton-box"></div>
        <div class="skeleton-box"></div>
        <div class="skeleton-box"></div>
      </div>
    </section>

    <section id="socials-section">
      <h2>Ecosystem</h2>
      <div id="socials-container" class="bento-grid">
        <div class="skeleton-social"></div>
        <div class="skeleton-social"></div>
        <div class="skeleton-social"></div>
      </div>
    </section>

    <section id="contact-section">
      <div class="contact-container">
        <div>
          <h2 class="contact-info-text">LET'S MAKE<br><span>MAGIC.</span></h2>
          <p style="color:var(--text-muted); font-size: 1.1rem; word-break: keep-all;">재미있는 상상이나 가벼운 커피챗, 어떤 이야기든 편하게 남겨주세요!</p>
        </div>
        <form id="contact-form">
          <input type="text" id="c-name" class="form-input" placeholder="> 성함이나 닉네임을 알려주세요" required>
          <input type="email" id="c-email" class="form-input" placeholder="> 답장 받으실 이메일 주소" required>
          <input type="text" id="c-message" class="form-input" placeholder="> 어떤 재미있는 이야기를 나누고 싶으신가요?" required>
          <button type="submit" class="btn-submit" id="btn-contact-submit">메시지 보내기 🚀</button>
        </form>
      </div>
    </section>
  </main>

  <div id="project-modal" class="modal-overlay">
    <div class="modal-close-area" onclick="closeModal(false)"></div>
    <div class="modal-content" id="modal-content-area">
      <div class="modal-header">
        <span class="modal-title-sm">프로젝트 상세 보기</span>
        <button class="modal-close" onclick="closeModal(false)">✕</button>
      </div>
      <div id="modal-inner-content"></div>
    </div>
  </div>

  <div id="custom-toast" class="toast"></div>

  <script>
    const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwjWz-_qAwgVkn5DAx_UNgZxh_fsIypktqJdFhCCcM05wgWZPgzBnLFb2qzGzMzp41FRA/exec';
    let globalData = { projects: [], comments: [], socials: [] };

    document.addEventListener('DOMContentLoaded', () => {
      initCustomCursor();
      fetchData();
      setupContactForm();
      
      // ★ 추가: 안드로이드 기기 뒤로가기 버튼 이벤트 리스너
      window.addEventListener('popstate', () => {
        const modal = document.getElementById('project-modal');
        // 뒤로가기가 발생했는데 모달이 열려있다면 모달만 닫도록 지시 (true 파라미터 전달)
        if (modal.classList.contains('active')) {
          closeModal(true); 
        }
      });
    });

    function handleInputFocus(element) {
      if (window.innerWidth <= 768) {
        const modalContent = document.getElementById('modal-content-area');
        modalContent.classList.add('keyboard-active'); 
        setTimeout(() => {
          element.scrollIntoView({ behavior: "smooth", block: "center" });
        }, 300);
      }
    }

    function handleInputBlur() {
      if (window.innerWidth <= 768) {
        setTimeout(() => {
          if (document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
            document.getElementById('modal-content-area').classList.remove('keyboard-active');
          }
        }, 100);
      }
    }

    function initCustomCursor() {
      if(window.innerWidth <= 768) return; 
      const cursor = document.querySelector('.custom-cursor');
      const glow = document.getElementById('cursor-glow');
      
      document.addEventListener('mousemove', (e) => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
        
        glow.animate({
          left: `${e.clientX}px`,
          top: `${e.clientY + window.scrollY}px`
        }, { duration: 500, fill: "forwards" });
      });

      const interactives = document.querySelectorAll('a, button, input, .card-wrapper');
      interactives.forEach(el => {
        el.addEventListener('mouseenter', () => { cursor.style.transform = 'translate(-50%, -50%) scale(4)'; cursor.style.background = 'transparent'; cursor.style.border = '1px solid white'; });
        el.addEventListener('mouseleave', () => { cursor.style.transform = 'translate(-50%, -50%) scale(1)'; cursor.style.background = 'var(--text-main)'; cursor.style.border = 'none'; });
      });
    }

    function attachCardHoverEffects() {
      const cards = document.querySelectorAll('.card-wrapper');
      cards.forEach(card => {
        card.addEventListener('mousemove', (e) => {
          const rect = card.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;
          card.style.setProperty('--mouse-x', `${x}px`);
          card.style.setProperty('--mouse-y', `${y}px`);
        });
      });
      initCustomCursor();
    }

    let toastTimeout;
    function showToast(message) {
      const toast = document.getElementById('custom-toast');
      toast.textContent = message;
      toast.classList.add('show');
      clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => toast.classList.remove('show'), 3000); 
    }

    function getSafeImageUrl(url) {
      if (!url) return '';
      const strUrl = String(url).trim();
      let fileId = '';
      if (strUrl.includes('/file/d/')) { const match = strUrl.match(/\/file\/d\/([a-zA-Z0-9_-]+)/); if (match) fileId = match[1]; } 
      else if (strUrl.includes('id=')) { const match = strUrl.match(/[?&]id=([a-zA-Z0-9_-]+)/); if (match) fileId = match[1]; }
      if (fileId) return `https://drive.google.com/thumbnail?id=${fileId}&sz=w800`;
      return strUrl;
    }

    async function fetchData() {
      const projContainer = document.getElementById('project-container');
      if(GAS_WEB_APP_URL.includes('YOUR_SCRIPT_ID')) {
        projContainer.innerHTML = `<div style="color:#ff003c; padding: 2rem;">앗! 데이터 연결 주소를 설정해주세요.</div>`;
        return;
      }

      const cachedData = localStorage.getItem('vibe_lab_cache');
      if (cachedData) {
        try {
          const parsedCache = JSON.parse(cachedData);
          globalData = parsedCache;
          renderProjects(parsedCache.projects, parsedCache.comments);
          renderSocials(parsedCache.socials);
        } catch(e) { console.error(e); }
      }

      try {
        const response = await fetch(GAS_WEB_APP_URL);
        const data = await response.json();
        
        if (JSON.stringify(globalData) !== JSON.stringify(data)) {
          globalData = data; 
          localStorage.setItem('vibe_lab_cache', JSON.stringify(data));
          renderProjects(data.projects, data.comments);
          renderSocials(data.socials);
        }
      } catch (error) {
        if (!cachedData) {
          projContainer.innerHTML = `<div style="color:#ff003c; padding: 2rem;">데이터를 불러오는데 실패했어요 😢 잠시 후 다시 시도해주세요.</div>`;
        }
      }
    }

    function renderProjects(projects, comments) {
      const container = document.getElementById('project-container');
      container.innerHTML = '';
      if(!projects || projects.length === 0) return;

      projects.forEach(proj => {
        const cardWrap = document.createElement('div');
        cardWrap.className = 'card-wrapper';
        cardWrap.onclick = () => openModal(proj.id); 

        const likesCount = proj.likes || 0;
        const commentsCount = comments.filter(c => c.projectId == proj.id).length;
        const safeImgUrl = getSafeImageUrl(proj.image);

        cardWrap.innerHTML = `
          <div class="project-card">
            <div class="project-img-wrapper">
              ${safeImgUrl ? `<img src="${safeImgUrl}" class="project-img" alt="${proj.title}" loading="lazy">` : '<div style="display:flex;height:100%;align-items:center;justify-content:center;color:#666;">이미지가 없어요 😢</div>'}
            </div>
            <div class="project-content">
              <div><span class="status-badge">${proj.status || '출시 완료'}</span></div>
              <h3 class="project-title">${proj.title}</h3>
              <p class="project-desc-short">${proj.desc}</p>
              <div class="project-meta">
                <span>❤️ 좋아요 ${likesCount}</span>
                <span>💬 댓글 ${commentsCount}</span>
              </div>
            </div>
          </div>
        `;
        container.appendChild(cardWrap);
      });
      attachCardHoverEffects();
    }

    function openModal(projectId) {
      const proj = globalData.projects.find(p => p.id == projectId);
      if(!proj) return;
      
      const projComments = globalData.comments.filter(c => c.projectId == proj.id);
      const commentsHTML = projComments.map(c => 
        `<div class="comment-item">
          <span class="comment-user">👤 ${c.name} 님의 이야기</span>
          <div class="comment-text">${c.text}</div>
        </div>`
      ).join('');

      const rawLink = String(proj.link || '').trim();
      const hasValidLink = rawLink.startsWith('http://') || rawLink.startsWith('https://');
      const visitCtaHTML = hasValidLink ? `<a href="${rawLink}" target="_blank" class="btn-visit">서비스 구경가기 ↗</a>` : '';
      const safeImgUrl = getSafeImageUrl(proj.image);

      const modalInner = document.getElementById('modal-inner-content');
      
      modalInner.innerHTML = `
        ${safeImgUrl ? `<img src="${safeImgUrl}" class="modal-img" alt="${proj.title}">` : ''}
        <div class="modal-body">
          <h3 class="modal-title">${proj.title}</h3>
          <p class="modal-desc">${proj.desc}</p>
          
          <div class="action-row">
            <button class="btn-action" onclick="handleLike('${proj.id}', this)">❤️ 응원하기 (${proj.likes || 0})</button>
            ${visitCtaHTML}
          </div>
          
          <div class="comment-section-title">따뜻한 피드백을 남겨주세요 💬</div>
          <div class="comment-list" id="comments-${proj.id}">
            ${commentsHTML || '<div style="color:var(--text-muted);">아직 작성된 글이 없어요. 첫 번째 주인공이 되어주세요! ✨</div>'}
          </div>
          <form class="comment-form" onsubmit="handleComment(event, '${proj.id}')">
            <input type="text" class="comment-input" id="name-${proj.id}" placeholder="닉네임을 알려주세요" required onfocus="handleInputFocus(this)" onblur="handleInputBlur()">
            <input type="text" class="comment-input" id="text-${proj.id}" placeholder="어떤 점이 좋았나요? 편하게 적어주세요!" required onfocus="handleInputFocus(this)" onblur="handleInputBlur()">
            <button type="submit" class="btn-submit-comment">등록하기</button>
          </form>

          <button type="button" class="btn-close-bottom" onclick="closeModal(false)">닫기</button>
        </div>
      `;
      
      const modal = document.getElementById('project-modal');
      modal.classList.add('active');
      document.body.style.overflow = 'hidden'; 
      initCustomCursor(); 

      // ★ 추가: 모달이 열릴 때 주소창 해시를 강제로 추가하여 History 스택을 쌓음
      window.history.pushState({ modalOpen: true }, "", "#project-" + projectId);
    }

    // ★ 수정: isFromHistory 파라미터를 추가하여 뒤로가기 버튼인지 확인
    function closeModal(isFromHistory = false) {
      const modal = document.getElementById('project-modal');
      // 이미 닫혀있으면 무시
      if (!modal.classList.contains('active')) return;

      modal.classList.remove('active');
      document.body.style.overflow = '';
      document.getElementById('modal-content-area').classList.remove('keyboard-active');
      
      // 화면 내의 닫기 버튼이나 배경을 터치해서 닫은 경우 (안드로이드 뒤로가기가 아닌 경우)
      // 강제로 쌓았던 History 스택을 하나 뒤로 돌려서 깔끔하게 정리해줍니다.
      if (!isFromHistory) {
        window.history.back();
      }
      
      fetchData(); 
    }

    function renderSocials(socials) {
      const container = document.getElementById('socials-container');
      container.innerHTML = '';
      if(!socials) return;
      socials.forEach(social => {
        const card = document.createElement('a');
        card.href = social.url || '#'; card.target = '_blank';
        card.className = 'social-card'; 
        card.innerHTML = `
          <div class="social-platform">${social.platform}</div>
          <div class="social-handle">${social.handle}</div>
          <div class="social-desc">${social.desc || ''}</div>
        `;
        container.appendChild(card);
      });
    }

    async function handleLike(projectId, btnElement) {
      showToast('❤️ 좋아요! 따뜻한 응원 감사합니다.');
      const match = btnElement.innerText.match(/\d+/);
      if(match) {
        const currentNum = parseInt(match[0], 10);
        btnElement.innerHTML = `❤️ 응원하기 (${currentNum + 1})`;
      }
      try { await fetch(GAS_WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'like', projectId }) }); } 
      catch(e) { console.error(e); }
    }

    async function handleComment(event, projectId) {
      event.preventDefault();
      const name = document.getElementById(`name-${projectId}`).value;
      const text = document.getElementById(`text-${projectId}`).value;
      const btn = event.target.querySelector('button');
      btn.textContent = '등록 중...';
      
      try {
        await fetch(GAS_WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'comment', projectId, name, text }) });
        showToast('✅ 소중한 피드백이 등록되었어요!');
        const commentList = document.getElementById(`comments-${projectId}`);
        if(commentList.innerHTML.includes('첫 번째 주인공이')) commentList.innerHTML = '';
        
        const newComment = document.createElement('div');
        newComment.className = 'comment-item';
        newComment.innerHTML = `<span class="comment-user">👤 ${name} 님의 이야기</span><div class="comment-text">${text}</div>`;
        commentList.appendChild(newComment);
        
        event.target.reset();
        handleInputBlur(); 
      } catch(e) { showToast('❌ 등록에 실패했어요. 잠시 후 시도해주세요.'); } 
      finally { btn.textContent = '등록하기'; }
    }

    function setupContactForm() {
      const form = document.getElementById('contact-form');
      const btn = document.getElementById('btn-contact-submit');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('c-name').value;
        const email = document.getElementById('c-email').value;
        const message = document.getElementById('c-message').value;

        btn.textContent = '전송 중... 🚀'; btn.style.pointerEvents = 'none';

        try {
          const res = await fetch(GAS_WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'contact', name, email, message }) });
          const result = await res.json();
          if(result.success) { showToast('🚀 성공적으로 메시지를 보냈어요!'); form.reset(); } 
          else { showToast('❌ 전송에 실패했어요.'); }
        } catch(error) { showToast('❌ 네트워크 오류가 발생했어요.'); } 
        finally { btn.textContent = '메시지 보내기 🚀'; btn.style.pointerEvents = 'auto'; }
      });
    }
  </script>
</body>
</html>
