<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vibe Coding Lab 🧪</title>
  <style>
    /* --- 1. 글로벌 & 타이포그래피 --- */
    :root {
      --bg-color: #fcfcfd;
      --bg-glass: rgba(255, 255, 255, 0.7);
      --bg-card: #ffffff;
      --text-main: #09090b;
      --text-muted: #71717a;
      --border-color: rgba(0, 0, 0, 0.06);
      --accent: #18181b;
      --vibe-blue: #0066ff;
      --shadow-sm: 0 4px 20px -2px rgba(0, 0, 0, 0.03);
      --shadow-hover: 0 20px 40px -8px rgba(0, 0, 0, 0.08);
      --radius-xl: 28px;
      --radius-lg: 20px;
    }

    body.dark-mode {
      --bg-color: #050505;
      --bg-glass: rgba(10, 10, 10, 0.7);
      --bg-card: #0f0f11;
      --text-main: #fafafa;
      --text-muted: #a1a1aa;
      --border-color: rgba(255, 255, 255, 0.08);
      --accent: #ffffff;
      --vibe-blue: #3b82f6;
      --shadow-sm: 0 4px 20px -2px rgba(0, 0, 0, 0.4);
      --shadow-hover: 0 20px 40px -8px rgba(255, 255, 255, 0.04);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, sans-serif;
      background-color: var(--bg-color); color: var(--text-main); line-height: 1.6;
      -webkit-font-smoothing: antialiased; transition: background-color 0.4s ease, color 0.4s ease;
      overflow-x: hidden;
    }

    /* --- 2. 네비게이션 --- */
    nav {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 100;
      background-color: var(--bg-glass); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border-color); border-radius: 99px;
      padding: 0.8rem 2rem; display: flex; gap: 3rem; align-items: center;
      box-shadow: var(--shadow-sm); transition: all 0.4s ease;
    }
    .nav-logo { font-size: 1.1rem; font-weight: 800; text-decoration: none; color: var(--text-main); letter-spacing: -0.02em; }
    .nav-links { display: flex; gap: 2rem; align-items: center; }
    .nav-links a { text-decoration: none; color: var(--text-main); font-size: 0.95rem; font-weight: 600; opacity: 0.6; transition: opacity 0.2s; }
    .nav-links a:hover { opacity: 1; color: var(--vibe-blue); }
    .theme-icon { font-size: 1.2rem; cursor: pointer; background: none; border: none; padding: 0; transition: transform 0.3s ease; }
    .theme-icon:hover { transform: scale(1.15) rotate(10deg); }
    @media (max-width: 768px) { nav { width: 90%; justify-content: space-between; gap: 1rem; padding: 0.8rem 1.5rem; } .nav-links a { display: none; } }

    main { max-width: 1100px; margin: 0 auto; padding: 8rem 1.5rem 6rem; }
    section { margin-bottom: 8rem; }
    h2 { font-size: 2.5rem; font-weight: 800; margin-bottom: 2.5rem; letter-spacing: -0.03em; text-align: center; }
    
    /* --- 3. 헤더 (Hero) --- */
    .hero { min-height: 50vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; margin-bottom: 6rem; }
    .hero h1 { font-size: clamp(2rem, 5vw, 4.2rem); font-weight: 800; letter-spacing: -0.04em; margin-bottom: 1.5rem; line-height: 1.2; word-break: keep-all; }
    .hero h1 .blue-text { color: var(--vibe-blue); background: linear-gradient(135deg, var(--vibe-blue), #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .hero p { color: var(--text-muted); font-size: 1.2rem; font-weight: 500; max-width: 550px; word-break: keep-all; margin-bottom: 3rem; }
    .btn-hero { background-color: var(--text-main); color: var(--bg-color); text-decoration: none; padding: 1.1rem 2.5rem; border-radius: 99px; font-weight: 700; font-size: 1.05rem; transition: transform 0.3s ease, box-shadow 0.3s; }
    .btn-hero:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }

    /* --- 4. 프로젝트 섹션 (Grid 아키텍처 도입) --- */
    .project-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 2rem; }
    .project-card { 
      background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-lg); 
      overflow: hidden; box-shadow: var(--shadow-sm); transition: transform 0.3s ease, box-shadow 0.3s; cursor: pointer; 
      display: flex; flex-direction: column;
    }
    .project-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-hover); }
    .project-img { width: 100%; height: 220px; object-fit: cover; background-color: var(--border-color); border-bottom: 1px solid var(--border-color); }
    .project-content { padding: 1.8rem; display: flex; flex-direction: column; flex: 1; }
    .project-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.8rem; }
    .project-title { font-size: 1.4rem; font-weight: 800; letter-spacing: -0.02em; }
    .status-badge { font-size: 0.75rem; font-weight: 700; padding: 0.3rem 0.8rem; border-radius: 99px; background: rgba(37, 99, 235, 0.1); color: var(--vibe-blue); white-space: nowrap; }
    .project-desc-short { color: var(--text-muted); font-size: 0.95rem; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 1.5rem; }
    .project-meta { margin-top: auto; display: flex; gap: 1rem; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); }

    /* --- 5. 에코시스템 섹션 (Bento) --- */
    .bento-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; }
    .social-card {
      position: relative; overflow: hidden; border-radius: var(--radius-lg);
      background-color: var(--bg-card); border: 1px solid var(--border-color);
      padding: 2.5rem 2rem; display: flex; flex-direction: column; gap: 1rem;
      text-decoration: none; color: var(--text-main);
      box-shadow: var(--shadow-sm); transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .social-card:hover { transform: translateY(-4px) scale(1.01); box-shadow: var(--shadow-hover); }
    .social-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: var(--brand-color, var(--text-main)); transition: height 0.3s ease, opacity 0.3s ease; opacity: 0.8; }
    .social-card:hover::before { height: 100%; opacity: 0.03; }
    [data-platform="youtube"] { --brand-color: #ff0000; }
    [data-platform="instagram"] { --brand-color: #e1306c; }
    [data-platform="twitter"], [data-platform="x"] { --brand-color: var(--text-main); }
    [data-platform="linkedin"] { --brand-color: #0a66c2; }
    [data-platform="github"] { --brand-color: #333333; }
    .social-platform { font-size: 0.85rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: var(--brand-color, var(--text-muted)); }
    .social-handle { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.02em; }
    .social-stats { display: inline-block; padding: 0.3rem 0.8rem; border-radius: 99px; background: var(--bg-color); border: 1px solid var(--border-color); font-size: 0.8rem; font-weight: 700; width: max-content; }
    .social-desc { font-size: 0.95rem; color: var(--text-muted); line-height: 1.5; margin-top: auto; }

    /* --- 6. 모달 (프로젝트 상세) --- */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      z-index: 1000; display: flex; justify-content: center; align-items: center;
      opacity: 0; pointer-events: none; transition: opacity 0.3s ease; padding: 1rem;
    }
    .modal-overlay.active { opacity: 1; pointer-events: auto; }
    .modal-content {
      background: var(--bg-card); width: 100%; max-width: 800px; max-height: 90vh;
      border-radius: var(--radius-xl); overflow-y: auto; position: relative;
      transform: translateY(20px) scale(0.98); transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); border: 1px solid var(--border-color);
      display: flex; flex-direction: column;
    }
    .modal-overlay.active .modal-content { transform: translateY(0) scale(1); }
    .modal-close {
      position: absolute; top: 1.5rem; right: 1.5rem;
      background: var(--bg-glass); border: 1px solid var(--border-color); width: 36px; height: 36px;
      border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center;
      font-size: 1.2rem; color: var(--text-main); z-index: 10; backdrop-filter: blur(4px); transition: background 0.2s;
    }
    .modal-close:hover { background: var(--border-color); }
    .modal-img { width: 100%; height: 350px; object-fit: cover; background: var(--border-color); border-bottom: 1px solid var(--border-color); }
    @media (max-width: 600px) { .modal-img { height: 200px; } }
    .modal-body { padding: 2.5rem; }
    .modal-title-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .modal-title { font-size: 2rem; font-weight: 800; }
    .modal-desc { font-size: 1.1rem; color: var(--text-muted); margin-bottom: 2rem; }
    
    /* 모달 내 폼 및 댓글 영역 */
    .interaction-area { border-top: 1px solid var(--border-color); padding-top: 2rem; }
    .btn-action { background: var(--bg-color); color: var(--text-main); border: 1px solid var(--border-color); padding: 0.7rem 1.2rem; border-radius: 99px; font-weight: 700; font-size: 0.95rem; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .btn-action:hover { border-color: var(--text-main); }
    .comment-list { background: var(--bg-color); border-radius: 16px; padding: 1.5rem; margin: 1.5rem 0; max-height: 250px; overflow-y: auto; border: 1px solid var(--border-color); }
    .comment-item { margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px dashed var(--border-color); font-size: 0.95rem; }
    .comment-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .comment-user { font-weight: 800; margin-right: 0.5rem; }
    .comment-date { font-size: 0.8rem; color: var(--text-muted); }
    
    .comment-form { display: flex; gap: 0.5rem; background: var(--bg-color); padding: 0.4rem; border-radius: 99px; border: 1px solid var(--border-color); }
    .comment-input { flex: 1; padding: 0.8rem 1rem; border: none; background: transparent; color: var(--text-main); font-family: inherit; font-size: 0.95rem; outline: none; }
    .comment-input.author { flex: 0.3; border-right: 1px solid var(--border-color); border-radius: 0; }
    /* ★ 버튼 글자 가로 유지 핵심 코드 */
    .btn-submit-comment { background: var(--text-main); color: var(--bg-color); border: none; padding: 0 1.5rem; border-radius: 99px; font-weight: 700; cursor: pointer; transition: transform 0.2s; white-space: nowrap; flex-shrink: 0; }
    .btn-submit-comment:hover { transform: scale(1.05); }
    @media (max-width: 600px) { .comment-form { flex-direction: column; border-radius: 16px; padding: 0.8rem; } .comment-input.author { border-right: none; border-bottom: 1px solid var(--border-color); } .btn-submit-comment { padding: 1rem; border-radius: 12px; } }

    /* --- 7. 연락처 섹션 --- */
    .contact-container { background: var(--bg-card); border-radius: var(--radius-xl); padding: 4rem; border: 1px solid var(--border-color); box-shadow: var(--shadow-sm); display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: center; }
    @media (max-width: 768px) { .contact-container { grid-template-columns: 1fr; padding: 2.5rem 1.5rem; gap: 3rem; } }
    .contact-form { display: flex; flex-direction: column; gap: 1rem; }
    .form-input { width: 100%; padding: 1.2rem; border: none; border-bottom: 2px solid var(--border-color); background: transparent; color: var(--text-main); font-family: inherit; font-size: 1rem; outline: none; transition: border-color 0.3s; }
    .form-input:focus { border-color: var(--vibe-blue); }
    .form-input::placeholder { color: var(--text-muted); }
    textarea.form-input { resize: vertical; min-height: 100px; }
    .btn-black { background: var(--text-main); color: var(--bg-color); border: none; padding: 1.2rem; border-radius: 16px; font-size: 1.05rem; font-weight: 800; cursor: pointer; transition: transform 0.3s; margin-top: 0.5rem; }
    .btn-black:hover { transform: translateY(-3px); }
    .contact-info-text { font-size: 2rem; font-weight: 800; color: var(--text-main); margin-bottom: 1rem; line-height: 1.2; letter-spacing: -0.03em;}
    .contact-sub { font-size: 1rem; color: var(--text-muted); }

    .loader { text-align: center; padding: 4rem; color: var(--text-muted); font-weight: 600; font-size: 1.1rem; grid-column: 1 / -1; }

    /* --- 8. 토스트 팝업 --- */
    .toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%) scale(0.9); background-color: var(--text-main); color: var(--bg-color); padding: 1rem 2rem; border-radius: 99px; font-weight: 700; font-size: 0.95rem; box-shadow: 0 20px 40px rgba(0,0,0,0.2); backdrop-filter: blur(10px); transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); opacity: 0; z-index: 9999; pointer-events: none; white-space: nowrap; }
    .toast.show { top: 40px; transform: translateX(-50%) scale(1); opacity: 1; }
  </style>
</head>
<body>

  <nav>
    <a href="#" class="nav-logo">Vibe Lab 🧪</a>
    <div class="nav-links">
      <a href="#projects-section">Projects</a>
      <a href="#socials-section">Ecosystem</a>
      <a href="#contact-section">Contact</a>
    </div>
    <button class="theme-icon" id="theme-toggle" aria-label="Toggle Theme">💡</button>
  </nav>

  <main>
    <section class="hero">
      <h1>개발자 아니어도 괜찮아!<br><span class="blue-text">AI 바이브 코딩 랩 🧪</span></h1>
      <p>아이디어를 현실로. AI와 함께 만드는 1인 개발 생태계.</p>
      <a href="#projects-section" class="btn-hero">프로젝트 둘러보기 ↓</a>
    </section>

    <section id="projects-section">
      <h2>Projects</h2>
      <div id="project-container" class="project-grid">
        <div class="loader">Loading...</div>
      </div>
    </section>

    <section id="socials-section">
      <h2>Ecosystem</h2>
      <div id="socials-container" class="bento-grid">
        <div class="loader">Loading...</div>
      </div>
    </section>

    <section id="contact-section">
      <h2>Collaborate</h2>
      <div class="contact-container">
        <div class="contact-text-area">
          <p class="contact-info-text">Let's Build<br>Together.</p>
          <p class="contact-sub">새로운 아이디어나 커피챗, 언제든 환영합니다.</p>
        </div>
        <form id="contact-form" class="contact-form">
          <input type="text" id="c-name" class="form-input" placeholder="Name" required>
          <input type="email" id="c-email" class="form-input" placeholder="Email" required>
          <textarea id="c-message" class="form-input" placeholder="Message" required></textarea>
          <button type="submit" class="btn-black" id="btn-contact-submit">Send Message</button>
        </form>
      </div>
    </section>
  </main>

  <div id="project-modal" class="modal-overlay">
    </div>

  <div id="custom-toast" class="toast"></div>

  <script>
    // ★ 실제 구글 앱스 스크립트 웹앱 URL 입력 (액세스: 모든 사용자)
    const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwLbyHRFLAzjNG0aacWabwdlZseYd3poYyPZ4KLCrJ0HWwtPtn6E51k6oFFzG0wyWkIKg/exec';

    // 전역 상태 (모달에서 데이터 조회를 위해 저장)
    let globalData = { projects: [], comments: [], socials: [] };

    document.addEventListener('DOMContentLoaded', () => {
      initThemeToggle();
      fetchData();
      setupContactForm();
      setupModalClose();
    });

    function initThemeToggle() {
      const themeToggleBtn = document.getElementById('theme-toggle');
      if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');
      
      themeToggleBtn.addEventListener('click', () => {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        showToast(isDark ? '🌙 다크 모드 ON' : '☀️ 라이트 모드 ON');
      });
    }

    let toastTimeout;
    function showToast(message) {
      const toast = document.getElementById('custom-toast');
      toast.textContent = message;
      toast.classList.add('show');
      clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => toast.classList.remove('show'), 3000); 
    }

    async function fetchData() {
      const projContainer = document.getElementById('project-container');
      const socialContainer = document.getElementById('socials-container');
      
      if(GAS_WEB_APP_URL.includes('YOUR_SCRIPT_ID')) {
        projContainer.innerHTML = `<div class="loader" style="color:#ef4444;">URL 세팅 필요</div>`;
        socialContainer.innerHTML = '';
        return;
      }

      try {
        const response = await fetch(GAS_WEB_APP_URL);
        const data = await response.json();
        globalData = data; // 데이터 전역 저장
        renderProjects(data.projects, data.comments);
        renderSocials(data.socials);
      } catch (error) {
        projContainer.innerHTML = `<div class="loader">데이터 연결 실패</div>`;
        socialContainer.innerHTML = '';
      }
    }

    // --- 새로운 그리드 렌더링 함수 ---
    function renderProjects(projects, comments) {
      const container = document.getElementById('project-container');
      container.innerHTML = '';

      if(!projects || projects.length === 0) {
        container.innerHTML = `<div class="loader">No Projects</div>`;
        return;
      }

      projects.forEach(proj => {
        // 프로젝트 카드 클릭 시 해당 ID를 모달 함수로 넘김
        const card = document.createElement('div');
        card.className = 'project-card';
        card.onclick = () => openModal(proj.id); 

        const likesCount = proj.likes || 0;
        const commentsCount = comments.filter(c => c.projectId == proj.id).length;

        card.innerHTML = `
          ${proj.image ? `<img src="${proj.image}" class="project-img" alt="${proj.title}">` : '<div class="project-img" style="display:flex;align-items:center;justify-content:center;color:#9ca3af; font-weight:600;">No Image</div>'}
          <div class="project-content">
            <div class="project-header">
              <h3 class="project-title">${proj.title}</h3>
            </div>
            <p class="project-desc-short">${proj.desc}</p>
            <div class="project-meta">
              <span>❤️ ${likesCount}</span>
              <span>💬 ${commentsCount}</span>
            </div>
          </div>
        `;
        container.appendChild(card);
      });
    }

    // --- 새로운 상세 모달 창 함수 ---
    function openModal(projectId) {
      const proj = globalData.projects.find(p => p.id == projectId);
      if(!proj) return;
      
      const projComments = globalData.comments.filter(c => c.projectId == proj.id);
      const commentsHTML = projComments.map(c => 
        `<div class="comment-item">
          <span class="comment-user">${c.name}</span> ${c.text} 
          <span class="comment-date">${c.date ? new Date(c.date).toLocaleDateString() : ''}</span>
        </div>`
      ).join('');

      const modal = document.getElementById('project-modal');
      modal.innerHTML = `
        <div class="modal-content" onclick="event.stopPropagation()">
          <button class="modal-close" onclick="closeModal()">✕</button>
          ${proj.image ? `<img src="${proj.image}" class="modal-img" alt="${proj.title}">` : ''}
          <div class="modal-body">
            <div class="modal-title-row">
              <h3 class="modal-title">${proj.title}</h3>
              <span class="status-badge ${proj.status === '작업 중' ? 'wip' : ''}">${proj.status || '완료'}</span>
            </div>
            <p class="modal-desc">${proj.desc}</p>
            
            <div class="interaction-area">
              <div class="action-row">
                <button class="btn-action" onclick="handleLike('${proj.id}', this)">❤️ 좋아요 (${proj.likes || 0})</button>
              </div>
              <div class="comment-list" id="comments-${proj.id}">
                ${commentsHTML || '<div style="color:#a1a1aa; font-size: 0.95rem;">첫 피드백을 남겨주세요.</div>'}
              </div>
              <form class="comment-form" onsubmit="handleComment(event, '${proj.id}')">
                <input type="text" class="comment-input author" id="name-${proj.id}" placeholder="Name" required>
                <input type="text" class="comment-input text" id="text-${proj.id}" placeholder="피드백 남기기" required>
                <button type="submit" class="btn-submit-comment">등록</button>
              </form>
            </div>
          </div>
        </div>
      `;
      
      modal.classList.add('active');
      document.body.style.overflow = 'hidden'; // 뒤에 있는 배경 스크롤 방지
    }

    function closeModal() {
      const modal = document.getElementById('project-modal');
      modal.classList.remove('active');
      document.body.style.overflow = '';
      
      // 모달 닫을 때 데이터 새로 갱신 (좋아요/댓글 쓴거 메인 화면 반영 위함)
      fetchData(); 
    }

    function setupModalClose() {
      const modal = document.getElementById('project-modal');
      modal.addEventListener('click', closeModal); // 어두운 배경 클릭 시 닫기
    }

    function renderSocials(socials) {
      const container = document.getElementById('socials-container');
      container.innerHTML = '';
      
      if(!socials || socials.length === 0) {
        container.innerHTML = `<div class="loader">No Data</div>`; return;
      }
      socials.forEach(social => {
        const card = document.createElement('a');
        card.href = social.url || '#'; card.target = '_blank';
        card.className = 'social-card'; card.setAttribute('data-platform', social.platform);
        card.innerHTML = `
          <div class="social-platform">${social.platform}</div>
          <div class="social-handle">${social.handle}</div>
          ${social.stats ? `<div class="social-stats">${social.stats}</div>` : ''}
          <div class="social-desc">${social.desc || ''}</div>
        `;
        container.appendChild(card);
      });
    }

    async function handleLike(projectId, btnElement) {
      showToast('❤️ 좋아요 완료');
      const match = btnElement.innerText.match(/\d+/);
      if(match) {
        const currentNum = parseInt(match[0], 10);
        btnElement.innerText = `❤️ 좋아요 (${currentNum + 1})`;
      }
      try { await fetch(GAS_WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'like', projectId }) }); } 
      catch(e) { console.error(e); }
    }

    async function handleComment(event, projectId) {
      event.preventDefault();
      const name = document.getElementById(`name-${projectId}`).value;
      const text = document.getElementById(`text-${projectId}`).value;
      const btn = event.target.querySelector('button');
      btn.textContent = '...';
      
      try {
        await fetch(GAS_WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'comment', projectId, name, text }) });
        showToast('✅ 피드백 등록 완료');
        // 모달창 내에 작성한 댓글 즉시 UI에 추가
        const commentList = document.getElementById(`comments-${projectId}`);
        if(commentList.innerHTML.includes('첫 피드백을 남겨주세요')) commentList.innerHTML = '';
        commentList.innerHTML += `<div class="comment-item"><span class="comment-user">${name}</span> ${text} <span class="comment-date">지금</span></div>`;
        event.target.reset();
      } catch(e) { console.error(e); showToast('❌ 오류 발생'); } 
      finally { btn.textContent = '등록'; }
    }

    function setupContactForm() {
      const form = document.getElementById('contact-form');
      const btn = document.getElementById('btn-contact-submit');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('c-name').value;
        const email = document.getElementById('c-email').value;
        const message = document.getElementById('c-message').value;

        btn.textContent = 'Sending...'; btn.style.opacity = '0.7';

        try {
          const res = await fetch(GAS_WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'contact', name, email, message }) });
          const result = await res.json();
          if(result.success) { showToast('🚀 전송 완료'); form.reset(); } 
          else { showToast('❌ 전송 실패'); }
        } catch(error) { showToast('❌ 연결 오류'); } 
        finally { btn.textContent = 'Send Message'; btn.style.opacity = '1'; }
      });
    }
  </script>
</body>
